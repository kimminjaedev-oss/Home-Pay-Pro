kind = "web"
previewPath = "/"
title = "Property Management Platform"
version = "1.0.0"
id = "artifacts/property-mgmt"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18558

[services.development]
run = "pnpm --filter @workspace/property-mgmt run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/property-mgmt", "run", "build" ]
publicDir = "artifacts/property-mgmt/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18558"
BASE_PATH = "/"
